# ---------------------------------------------------------------------------
# Publication type
# Used to weight urgency. Final RTS scores higher than consultation.
# ---------------------------------------------------------------------------
publication_type:
  binding:
    - regulation_final
    - directive_final
    - delegated_regulation_final
    - implementing_regulation_final
    - rts_final
    - its_final
    - national_law_final
    - allgemeinverfuegung
    - administrative_decision
  near_binding:
    - guidelines_final
    - recommendation_final
    - opinion_published
    - q_and_a_published
    - merkblatt
    - rundschreiben
  consultative:
    - consultation_paper
    - discussion_paper
    - call_for_advice
    - call_for_evidence
    - draft_rts
    - draft_its
    - draft_guidelines
  soft_law_and_signals:
    - press_release
    - speech
    - newsletter
    - thematic_review_findings
    - dear_ceo_letter
    - supervisory_briefing
    - enforcement_decision
    - sanction_published
  case_law:
    - cjeu_judgment
    - cjeu_opinion_ag
    - bverwg_judgment
    - bgh_judgment
    - olg_judgment
    - admin_court_judgment

# ---------------------------------------------------------------------------
# Urgency weighting
# Multiplier applied during impact scoring.
# ---------------------------------------------------------------------------
urgency_weights:
  binding: 1.0
  near_binding: 0.8
  consultative: 0.5
  soft_law_and_signals: 0.4
  case_law: 0.7

# ---------------------------------------------------------------------------
# Service offering mapping
# Every classification can route to a fixed-fee apexlaw package.
# Update as the service catalogue evolves.
# ---------------------------------------------------------------------------
service_offerings:
  - id: gc_micar_authorisation
    name: "MiCAR CASP / ART / EMT authorisation package"
    triggers:
      regulation_family: [micar]
      topic: [authorisation_and_passporting.initial_authorisation]
    price_indication: "fixed fee from EUR 35.000"
  - id: gc_micar_white_paper
    name: "MiCAR white paper drafting and notification"
    triggers:
      regulation_family: [micar]
      topic: [digital_assets_specific.white_paper_review]
    price_indication: "fixed fee from EUR 12.000"
  - id: gc_dora_register
    name: "DORA register of information build and review"
    triggers:
      regulation_family: [dora]
      topic: [ict_and_resilience.third_party_arrangements]
    price_indication: "fixed fee from EUR 18.000"
  - id: gc_dora_incident_playbook
    name: "DORA incident reporting playbook"
    triggers:
      regulation_family: [dora]
      topic: [ict_and_resilience.incident_reporting]
    price_indication: "fixed fee from EUR 9.000"
  - id: gc_aml_package
    name: "AML / AMLR readiness assessment"
    triggers:
      regulation_family: [aml, tfr]
    price_indication: "fixed fee from EUR 14.000"
  - id: gc_psd_licence
    name: "PI / EMI authorisation package"
    triggers:
      regulation_family: [psd, emd]
      topic: [authorisation_and_passporting.initial_authorisation]
    price_indication: "fixed fee from EUR 28.000"
  - id: gc_tokenisation_legal_opinion
    name: "Tokenised RWA legal opinion and structuring"
    triggers:
      activity: [tokenisation_of_rwa, issuance_of_securities]
    price_indication: "fixed fee from EUR 22.000"
  - id: gc_sanctions_compliance
    name: "EU sanctions compliance review"
    triggers:
      regulation_family: [sanctions]
    price_indication: "fixed fee from EUR 8.000"
  - id: gc_regulatory_strategy_retainer
    name: "Quarterly regulatory strategy retainer"
    triggers: {}
    price_indication: "monthly retainer from EUR 4.500"
