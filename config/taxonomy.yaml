# EU Financial Reg Horizon Scanner
# Classification taxonomy
#
# Five axes drive every classification: regulation_family, activity,
# licence_type, topic, jurisdiction. Every Classification record stores
# the version below for reproducibility.

version: "2026.05.27"
maintainer: "Alex Vance"
review_cadence: "weekly during build phase, monthly after month 6"

# ---------------------------------------------------------------------------
# Axis 1: Regulation family
# Each family lists primary instrument plus Level 2 and Level 3 measures.
# ---------------------------------------------------------------------------
regulation_family:

  micar:
    long_name: "Markets in Crypto-Assets Regulation"
    primary: "Regulation (EU) 2023/1114"
    level_2:
      - "Delegated Regulations on white papers, marketing, market abuse"
      - "RTS on authorisation, conflicts of interest, complaints handling"
      - "RTS on own funds, recovery plans, redemption plans for issuers"
    level_3:
      - "ESMA Guidelines on suitability, custody, trading"
      - "EBA Guidelines on liquidity stress testing, recovery plans"
      - "EBA and ESMA Q&As"
    sub_topics:
      - art_issuance
      - emt_issuance
      - casp_authorisation
      - white_paper
      - marketing_communications
      - market_abuse_crypto
      - custody_safekeeping
      - operation_of_trading_platform
      - exchange_services
      - execution_of_orders
      - placing
      - reception_and_transmission
      - advice_on_crypto
      - portfolio_management_crypto
      - transfer_services

  dora:
    long_name: "Digital Operational Resilience Act"
    primary: "Regulation (EU) 2022/2554"
    level_2:
      - "RTS on ICT risk management framework"
      - "RTS on classification of major ICT-related incidents"
      - "RTS on register of information for ICT third-party arrangements"
      - "RTS on threat-led penetration testing"
      - "RTS on subcontracting of critical or important functions"
    level_3:
      - "ESA Joint Guidelines on estimation of aggregated annual costs and losses"
      - "Oversight forum outputs on critical ICT third-party providers"
    sub_topics:
      - ict_risk_management
      - incident_reporting
      - resilience_testing
      - tlpt
      - third_party_risk
      - critical_function_classification
      - subcontracting
      - register_of_information
      - oversight_ctpp

  mifid:
    long_name: "Markets in Financial Instruments Directive and Regulation"
    primary: "Directive 2014/65/EU and Regulation (EU) 600/2014"
    sub_topics:
      - authorisation_investment_firm
      - conduct_of_business
      - product_governance
      - inducements
      - best_execution
      - transaction_reporting
      - market_structure
      - systematic_internaliser
      - investor_protection
      - cross_border_passporting

  prudential_banks:
    long_name: "CRR / CRD / BRRD"
    primary:
      - "Regulation (EU) 575/2013"
      - "Directive 2013/36/EU"
      - "Directive 2014/59/EU"
    sub_topics:
      - capital_requirements
      - liquidity_lcr_nsfr
      - leverage_ratio
      - large_exposures
      - srep
      - resolution_planning
      - mrel
      - basel_iii_iv_implementation

  prudential_investment_firms:
    long_name: "IFR / IFD"
    primary:
      - "Regulation (EU) 2019/2033"
      - "Directive (EU) 2019/2034"
    sub_topics:
      - class_1_2_3_classification
      - k_factors
      - own_funds
      - remuneration
      - icaap_iliad

  psd:
    long_name: "Payment Services Directive / PSR"
    primary:
      - "Directive (EU) 2015/2366 (PSD2)"
      - "PSD3 proposal COM/2023/366"
      - "PSR proposal COM/2023/367"
    sub_topics:
      - psp_authorisation
      - sca
      - open_banking_apis
      - fraud_prevention
      - liability_allocation
      - confirmation_of_payee
      - cross_border_payments

  emd:
    long_name: "E-Money Directive / planned merger with PSD3"
    primary: "Directive 2009/110/EC"
    sub_topics:
      - emi_authorisation
      - safeguarding
      - own_funds_emi
      - redemption_rights

  mar:
    long_name: "Market Abuse Regulation"
    primary: "Regulation (EU) 596/2014"
    sub_topics:
      - insider_dealing
      - market_manipulation
      - disclosure_of_inside_information
      - managers_transactions
      - suspicious_transaction_reporting

  aml:
    long_name: "AML Package (AMLR, AMLD6, AMLA)"
    primary:
      - "Regulation (EU) 2024/1624 (AMLR)"
      - "Directive (EU) 2024/1640 (AMLD6)"
      - "Regulation (EU) 2024/1620 (AMLA)"
    sub_topics:
      - cdd
      - beneficial_ownership
      - sar_str
      - tfr_travel_rule
      - high_risk_third_countries
      - sanctions_screening
      - amla_direct_supervision

  tfr:
    long_name: "Transfer of Funds Regulation"
    primary: "Regulation (EU) 2023/1113"
    sub_topics:
      - travel_rule_crypto
      - self_hosted_wallets
      - originator_beneficiary_info

  sanctions:
    long_name: "EU restrictive measures framework"
    primary: "Various Council Regulations and Decisions"
    sub_topics:
      - asset_freeze
      - sectoral_sanctions
      - russia_belarus_packages
      - sanctions_circumvention
      - reporting_obligations

  gdpr:
    long_name: "General Data Protection Regulation"
    primary: "Regulation (EU) 2016/679"
    sub_topics:
      - lawful_basis
      - data_subject_rights
      - cross_border_transfers
      - dpia
      - breach_notification

  ai_act:
    long_name: "AI Act"
    primary: "Regulation (EU) 2024/1689"
    sub_topics:
      - prohibited_practices
      - high_risk_systems
      - gpai_obligations
      - sandbox

  bmr:
    long_name: "Benchmarks Regulation"
    primary: "Regulation (EU) 2016/1011"
    sub_topics:
      - administrator_authorisation
      - critical_benchmarks
      - third_country_benchmarks

  sfdr_taxonomy:
    long_name: "Sustainable Finance Disclosure Regulation and EU Taxonomy"
    primary:
      - "Regulation (EU) 2019/2088"
      - "Regulation (EU) 2020/852"
    sub_topics:
      - article_8_9_products
      - pai_indicators
      - taxonomy_alignment
      - csrd_interplay

  emir:
    long_name: "European Market Infrastructure Regulation"
    primary: "Regulation (EU) 648/2012"
    sub_topics:
      - clearing_obligation
      - margin_requirements
      - reporting
      - emir_3_active_account

  csdr:
    long_name: "Central Securities Depositories Regulation"
    primary: "Regulation (EU) 909/2014"
    sub_topics:
      - settlement_discipline
      - csd_authorisation
      - t_plus_1_migration

  prospectus_listing:
    long_name: "Prospectus Regulation / Listing Act"
    primary: "Regulation (EU) 2017/1129"
    sub_topics:
      - prospectus_exemptions
      - eu_growth_prospectus
      - tokenised_securities_offering
      - listing_act_2024_reforms

  mica_for_securities:
    long_name: "DLT Pilot Regime"
    primary: "Regulation (EU) 2022/858"
    sub_topics:
      - dlt_mtf
      - dlt_ss
      - dlt_tss

