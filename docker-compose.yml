services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: horizon-scanner-postgres
    ports:
      - "5438:5432"
    environment:
      POSTGRES_USER: horizon
      POSTGRES_PASSWORD: horizon
      POSTGRES_DB: horizon_scanner
    volumes:
      - horizon_scanner_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U horizon -d horizon_scanner"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  horizon_scanner_pgdata:
